<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Asking and Giving Directions - Pattern</title>
    <link rel="icon" type="image" href="asset/imgDirection/Logo.png"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet"/>  

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #e0f2fe;
            background-image: url('asset/imgDirection/่Asking.png');
            
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.4);
            z-index: 0;
            pointer-events: none;
        }
        .title-font {
    font-family: 'Playfair Display', serif;
}

/* สไตล์ปุ่มไม้สำหรับหน้าเลือกข้อ */
.wood-button {
    background-color: #fef3c7; /* สีเนื้อไม้ */
    border: 6px solid #78350f; /* ขอบสีน้ำตาลเข้ม */
    color: #451a03;
    box-shadow: 0 8px 0 #451a03, 0 15px 20px rgba(0,0,0,0.2);
    transition: all 0.15s ease;
    position: relative;
}
.wood-button:active {
    transform: translateY(8px);
    box-shadow: 0 0px 0 #451a03, 0 5px 10px rgba(0,0,0,0.2);
}
.wood-button:hover {
    background-color: #fde68a;
}

/* หมุดติดปุ่มไม้ */
.pin {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    background: radial-gradient(circle at 30% 30%, #9ca3af, #4b5563);
    border-radius: 50%;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

/* สไตล์ปุ่ม START หน้าแรก */
.start-button {
    background-color: #a0522d; /* สีน้ำตาล (Sienna) */
    color: white;
    border: 4px solid white;
    border-radius: 9999px; /* ทรงเม็ดยา Pill */
    padding: 0.75rem 3rem;
    font-size: 2rem;
    font-weight: bold;
    box-shadow: 0 0 0 3px #a0522d, 0 10px 15px rgba(0,0,0,0.2);
    transition: all 0.2s;
    font-family: 'Prompt', sans-serif;
    letter-spacing: 0.05em;
}
.start-button:hover {
    background-color: #8b4513;
    box-shadow: 0 0 0 3px #8b4513, 0 15px 25px rgba(0,0,0,0.3);
    transform: scale(1.05);
}
.start-button:active {
    transform: scale(0.95);
}

/* ตกแต่งด้วยธรรมชาติ (Emoji จำลองสวน) */
.garden-decor {
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    font-size: 5rem;
    z-index: 0;
    opacity: 0.95;
    pointer-events: none;
    filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.2));
    white-space: nowrap;
}

.bird {
    position: absolute;
    font-size: 3rem;
    animation: float 4s ease-in-out infinite;
}

.bird-decor {
    position: absolute;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
}

/* Animations */
.fade-in {
    animation: fadeInScale 0.6s ease-out forwards;
}
@keyframes fadeInScale {
    0% { opacity: 0; transform: scale(0.95) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}
    </style>
</head>

<body>
    <div id="root"></div>
<script type="text/babel">
    // ข้อมูลโจทย์ทั้ง 10 ข้อ
    const situations = [
        {
            id: 1,
            pattern: "How do I get to...?",
            studentA: { start: "Hospital", target: "Cinema", text: "Excuse me, how do I get to the Cinema from the Hospital?" },
            studentB: { start: "Police Station", target: "Bank", text: "Could you tell me the way to the Bank from the Police Station, please?"}
        },
        {
            id: 2,
            pattern: "Could you tell me the way to...?",
            studentA: { start: "Book Shop", target: "Library", text: "Could you tell me the way to the Library from the Book Shop, please?" },
            studentB: { start: "Bank", target: "Museum", text: "Excuse me, how do I get to the Museum from the Bank?" }
        },
        {
            id: 3,
            pattern: "Is there a... near here?",
            studentA: { start: "School", target: "Toys shop", text: "Excuse me, is there a toys shop near here?" },
            studentB: { start: "Airport", target: "Hotel", text: "Excuse me, is there a hotel near here?" }
        },
        {
            id: 4,
            pattern: "How do I get to...?",
            studentA: { start: "Train Station", target: "Restaurant", text: "Excuse me, how do I get to the Restaurant from the Train Station?" },
            studentB: { start: "Book Shop", target: "Library", text: "Could you tell me the way to the Library from the Book Shop, please?" }
        },
        {
            id: 5,
            pattern: "Could you tell me the way to...?",
            studentA: { start: "Police Station", target: "Bank", text: "Could you tell me the way to the Bank from the Police Station, please?" },
            studentB: { start: "Restaurant", target: "Eiffel Tower", text: "Excuse me, how do I get to the Eiffel Tower from the Restaurant?" }
        },
        {
            id: 6,
            pattern: "Is there a... near here?",
            studentA: { start: "Shopping Mall", target: "Coffee shop", text: "Excuse me, is there a coffee shop near here?" },
            studentB: { start: "Book Shop", target: "Library", text: "Could you tell me the way to the Library from the Book Shop, please?" }
        },
        {
            id: 7,
            pattern: "How do I get to...?",
            studentA: { start: "Bank", target: "Museum", text: "Excuse me, how do I get to the Museum from the Bank?" },
            studentB: { start: "School", target: "Toys shop", text: "Excuse me, is there a toys shop near here?" }
        },
        {
            id: 8,
            pattern: "Could you tell me the way to...?",
            studentA: { start: "Petshop", target: "Pizza shop", text: "Could you tell me the way to the Pizza shop from the Petshop, please?" },
            studentB: { start: "Restaurant", target: "Eiffel Tower", text: "Excuse me, how do I get to the Eiffel Tower from the Restaurant?" }
        },
        {
            id: 9,
            pattern: "Is there a... near here?",
            studentA: { start: "Airport", target: "Hotel", text: "Excuse me, is there a hotel near here?" },
            studentB: { start: "Restaurant", target: "Eiffel Tower", text: "Excuse me, how do I get to the Eiffel Tower from the Restaurant?" }
        },
        {
            id: 10,
            pattern: "How do I get to...?",
            studentA: { start: "Restaurant", target: "Eiffel Tower", text: "Excuse me, how do I get to the Eiffel Tower from the Restaurant?" },
            studentB: { start: "Police Station", target: "Bank", text: "Could you tell me the way to the Bank from the Police Station, please?"}
        }
    ];

    const App = () => {
        // สถานะของหน้าจอ: 'start', 'menu', 'question'
        const [currentScreen, setCurrentScreen] = React.useState('start');
        const [selectedQuestion, setSelectedQuestion] = React.useState(null);

        const handleStart = () => {
            setCurrentScreen('menu');
        };

        const handleSelect = (id) => {
            const q = situations.find(s => s.id === id);
            setSelectedQuestion(q);
            setCurrentScreen('question');
        };

        const handleBack = () => {
            setSelectedQuestion(null);
            setCurrentScreen('menu');
        };

        return (
            <div className="min-h-screen relative flex flex-col items-center justify-center p-4 z-10 pb-[140px]">
                {currentScreen === 'start' && (
                        <>
                            <img src="asset/imgDirection/16.png" alt="Decoration" className="relative bird-decor top-18 right-[3%] md:right-[23%] opacity-80" style={{animationDelay: '0s', width: '90px'}} />
                            <img src="asset/imgDirection/17.png" alt="Decoration" className="relative bird-decor top-22 left-[8%] md:left-[28%] opacity-80" style={{animationDelay: '1s', width: '110px'}} />
                        </>
                    )}
                {/* --- หน้าแรก (Start Screen) --- */}
                    {currentScreen === 'start' && (
                        <div className="text-center fade-in mt-[-25vh]">
                            <h1 className="title-font text-[5rem] md:text-[7rem] font-bold text-black leading-[1.05] mb-8" style={{ textShadow: "2px 2px 10px rgba(255,255,255,0.8)" }}>
                                Asking and<br/>Giving Direction
                            </h1><br/>
                            <button onClick={handleStart} className="start-button">
                                START
                            </button>
                        </div>
                    )}

                {/* 2. หน้าเมนูเลือกข้อ (Menu Screen) */}
                {currentScreen === 'menu' && (
                    <div className="z-10 max-w-5xl w-full text-center fade-in mt-[-5vh]">
                        <div className="bg-white/60 backdrop-blur-md py-6 px-4 rounded-3xl mb-8 shadow-sm inline-block"><br/>
                            <h2 className="title-font text-3xl md:text-4xl font-bold text-black leading-tight">
                                Read the situations carefully and understand <br className="hidden md:block" />
                                each question before answering.
                            </h2>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 md:gap-10 max-w-4xl mx-auto px-4 pb-24">
                            {situations.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => handleSelect(item.id)}
                                    className="wood-button w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center text-5xl md:text-6xl font-black title-font mx-auto"
                                >
                                    <div className="pin"></div>
                                    {item.id}
                                </button>
                            ))}
                        </div>
                    </div>
                )}

                {/* 3. หน้าแสดงโจทย์ (Question Card) */}
                {currentScreen === 'question' && selectedQuestion && (
                    <div className="z-10 w-[95%] max-w-6xl bg-white rounded-[2rem] shadow-2xl p-6 md:p-12 fade-in relative border-[5px] border-[#8b4513] mb-12 mt-8 mx-auto">

                        {/* ปุ่ม Home ด้านซ้ายบน */}
                            <button 
                                onClick={handleBack}
                                className="absolute -top-5 -right-5 w-12 h-12 md:w-14 md:h-14 bg-white text-[#a0522d] hover:bg-orange-50 rounded-full flex items-center justify-center text-xl md:text-2xl shadow-lg border-4 border-[#a0522d] transition-transform hover:scale-110 z-20"
                                title="Back to Menu"
                            >
                                ✖
                            </button>
                            {/* วงกลมแสดงเลขข้อตรงกลางด้านบน */}
                            <div className="absolute -top-10 left-1/2 transform -translate-x-1/2 w-20 h-20 bg-[#a0522d] text-white rounded-full flex items-center justify-center text-4xl font-bold shadow-xl title-font border-4 border-white z-20">
                                {selectedQuestion.id}
                            </div>
                        <br/>
                        <div className="flex flex-col items-center justify-center text-center pt-2 mb-8 border-b-2 border-orange-100 pb-6">
                            <img src="asset/imgDirection/map.png" alt="Decoration" className="mb-3 rounded-2xl" style={{width: '50%'}} />
                            <span className="inline-block bg-orange-100 text-orange-800 px-4 py-1 rounded-full text-sm font-bold tracking-wide mb-2 uppercase border border-orange-200">
                                Pattern: {selectedQuestion.pattern}
                            </span>
                            <h2 className="text-2xl font-bold text-slate-700 mt-2">
                                Start: <span className="text-blue-600">{selectedQuestion.studentA.start}</span> 
                                <span className="mx-3 text-slate-400">➔</span> 
                                Target: <span className="text-green-600">{selectedQuestion.studentA.target}</span>
                            </h2>
                        </div>
                        <div className="flex flex-col gap-10 w-full">
                            {/* Student A */}
                            <div className="bg-blue-50/80 rounded-2xl p-6 border-2 border-blue-200 shadow-sm relative">
                                <div className="absolute -top-4 left-6 bg-blue-500 text-white px-4 py-1 rounded-lg font-bold shadow-md">
                                    👨‍🎓 Tourist A
                                </div>
                                <div className="mt-4 text-xl md:text-2xl text-slate-800 font-medium leading-relaxed">
                                    "{selectedQuestion.studentA.text}"
                                </div>
                                <p className="text-sm text-blue-600 mt-4 font-semibold bg-blue-100 inline-block px-3 py-1 rounded-full">
                                    📍 You are at the {selectedQuestion.studentA.start}
                                </p>
                            </div>
                        </div><br/>
                        <div className="text-center mb-8 border-b-4 border-blue-400 pb-6">
                            <h2 className="text-2xl font-bold text-slate-700 mt-2">
                            </h2>
                        </div>
                        <div className="grid md:grid-cols-2 gap-8"></div>
                        <div className="text-center mb-8 border-b-2 border-orange-100 pb-6">
                            <span className="inline-block bg-orange-100 text-orange-800 px-4 py-1 rounded-full text-sm font-bold tracking-wide mb-2 uppercase border border-orange-200">
                                Pattern: {selectedQuestion.pattern}
                            </span>
                            <h2 className="text-2xl font-bold text-slate-700 mt-2">
                                Start: <span className="text-blue-600">{selectedQuestion.studentB.start}</span> 
                                <span className="mx-3 text-slate-400">➔</span> 
                                Target: <span className="text-green-600">{selectedQuestion.studentB.target}</span>
                            </h2>
                        </div>
                        <div className="flex flex-col gap-10 w-full">
                            {/* Student B */}
                            <div className="bg-green-50/80 rounded-2xl p-6 border-2 border-green-200 shadow-sm relative">
                                <div className="absolute -top-4 left-6 bg-green-600 text-white px-4 py-1 rounded-lg font-bold shadow-md">
                                    👩‍🌾 Tourist B
                                </div>
                                <div className="mt-4 text-xl md:text-2xl text-slate-800 font-medium leading-relaxed">
                                    "{selectedQuestion.studentB.text}"
                                </div>
                                <p className="text-sm text-green-700 mt-4 font-semibold bg-green-100 inline-block px-3 py-1 rounded-full">
                                    🎯 Target is the {selectedQuestion.studentB.target}
                                </p>
                            </div>
                        </div>

                        <div className="mt-12 text-center">
                            <button 
                                onClick={handleBack}
                                className="bg-slate-800 hover:bg-[#a0522d] text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg transition-all hover:scale-105"
                            >
                                ← Back to Numbers
                            </button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
